name: 翻譯問題
description: 回報錯譯、漏譯、用詞不一致或文本顯示問題
title: "[Translation] "
labels:
  - translation
body:
  - type: input
    id: modpack-version
    attributes:
      label: 模組包版本
      placeholder: "例如：v4.2.1"
    validations:
      required: true
  - type: input
    id: patch-version
    attributes:
      label: 中文化補丁版本
      placeholder: "例如：v4.2.1-tk.1"
    validations:
      required: false
  - type: textarea
    id: location
    attributes:
      label: 問題位置
      description: 請提供任務章節、物品名稱、畫面位置、檔案路徑或截圖連結。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 建議修正
      description: 若知道較合適的譯法，請直接提供。
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 補充資訊
    validations:
      required: false
