name: ParaTranz Download

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      rebuild:
        description: "下載前先強制 ParaTranz 重新建構 artifact（傳入 --rebuild）"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  download:
    uses: TeamKugimiya/reusable-workflows/.github/workflows/Modpack-Paratranz-Download.yml@v1
    with:
      rebuild: ${{ inputs.rebuild || false }}
    secrets: inherit
