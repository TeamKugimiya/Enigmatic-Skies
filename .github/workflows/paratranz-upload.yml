name: ParaTranz Upload

on:
  pull_request:
    branches:
      - main
    paths:
      - source/kubejs/**
  push:
    branches: 
      - main
    paths:
      - source/kubejs/**

jobs:
  upload:
    uses: TeamKugimiya/reusable-workflows/.github/workflows/Modpack-Paratranz-Upload.yml@v1
    with:
      dry_run: ${{ github.event_name == 'pull_request' }}
    secrets: inherit
